<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uPlanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">

    <link
            href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&amp;family=Comfortaa:wght@300..700&amp;family=Raleway:wght@100..900&amp;display=swap"
            rel="stylesheet">
    <link rel="stylesheet" href="../CSS/profile.css">
</head>

<body>
<header>
    <img class="logo" src="../img/logo.png" alt="">
    </div>
    <div class="drop-down">
        <p class="month-option current-active">Місяць</p>
        <p class="week-option unactive choose-option">Тиждень</p>
    </div>

    <div class="cute-img">
        <div class="main-animals">
            <div class="animal">
                <img src="../img/capybara.png" alt="">
                <p>хобі</p>
            </div>
            <div class="animal">
                <img src="../img/dove.png" alt="">
                <p>хобі</p>
            </div>
            <div class="animal">
                <img src="../img/dog.png" alt="">
                <p>хобі</p>
            </div>
            <div class="animal">
                <img src="../img/frog.png" alt="">
                <p>хобі</p>
            </div>
            <div class="animal">
                <img src="../img/cat.png" alt="">
                <p>хобі</p>
            </div>
            <img class="display-animal" src="../img/arrowDown.png" alt="">
        </div>

        <div class="drop-down-animal unactive ">
            <div class="animal">
                <img src="../img/hedgehog.png" alt="">
                <p>хобі</p>
            </div>
            <div class="animal">
                <img src="../img/mouse.png" alt="">
                <p>школа</p>
            </div>
            <div class="animal">
                <img src="../img/swan.png" alt="">
            </div>
            <div class="animal">
                <img src="../img/crab.png" alt="">
                <p>події</p>
            </div>
            <div class="animal">
                <img src="../img/chameleon.png" alt="">
                <p>дома...</p>
            </div>
            <div class="animal">
                <img src="../img/hedgehog.png" alt="">
                <p>хобі</p>
            </div>
        </div>
    </div>
    <img class="Hamburger" src="../img/hamburger.png" alt="">

</header>
<div class="settings-menu unactive">
    <img class="close-settings" src="../img/cancel.png" alt="закрити"
         style="position: absolute; top: 10px; right: 10px; width: 55px; cursor: pointer;">
    <div class="theme-toggle">
        <p><img id = "sun" src="../img/sun.svg" alt=""> <img id = "moon" src="../img/moon.svg" alt=""></p>
        <label class="switch">
            <input type="checkbox" id="theme-toggle-checkbox">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="color-options">
        <p>Теми</p>
        <div class="color-palette">
            <div class="color green"></div>
            <div class="color violet"></div>
            <div class="color pink"></div>
            <div class="color blue"></div>
        </div>
    </div>

    <div class="profile-block">
        <img src="../img/fox.svg" class="profile-icon" alt="avatar">
        <div class="user-info">
            <h2 class="name">Loading...</h2>
            <h2 class="userEmail">Loading...</h2>
        </div>
        <button id="settings" class="settings"><img src="../img/settings.svg" alt=""></button>
    </div>

    <!--<button id="logout-btn" class="logout-button">Вийти з аккаунту</button>-->
</div>
<main>
    <section class="profile">
        <div class="first-line">
            <div class="first">
                <img src="../img/fox.svg" class="bordered-img">
                <div class="second-line"></div>
                <div class="user-info">
                    <h1 class="nameProfile">Loading...</h1>
                    <h2 class="userEmailProfile">Loading...</h2>
                </div>
            </div>


            <form>
                <label for="email">Ім'я:</label>
                <input class="note-title" type="name" id="name" placeholder="smartUser">
                <label for="email">Пошта:</label>
                <input class = "note-title" type="email" id="email" placeholder="alinaaaaa@gmail.com">
                <label for="password">Пароль:</label>
                <input class = "note-title" type="password" id="password" placeholder="********" readonly>
                <a href="../HTML/forgot-password.html" class="forgot-password">Змінити пароль</a>
                <a id ="logout-btn" class="logout">Вийти з аккаунту</a>
                <a id ="delete-btn" class="logout">Видалити акаунт</a>
            </form>
        </div>
    </section>

    <section class="illustration">
        <img src="../img/fox.svg" alt="fox" />
    </section>
    <img id ="edit-acc" class="addTaskBtn" src="../img/confirm.png" alt="">
</main>
<div class="bottom-element">
    <div class="footer-container">
        <div class="footer-column">
            <img src="../img/logo.png" alt="Logo" class="footer-logo">
            <ul class="footer-links">
                <li><a href="#">Місяць</a></li>
                <li><a href="#">Тиждень</a></li>
            </ul>
        </div>

        <div class="footer-column center">
            <img src="../img/telegram-svgrepo-com 1.png" alt="Telegram" class="telegram-icon">
            <span>@SmartPlannerTgBot</span>
            <a href="../javadoc/index.html" class="developer-link">Портал розробника</a>
        </div>

        <div class="footer-column right">
            <p class="email">smartplanner@gmail.com</p>
            <div class="partners">
                <img src="../img/Clip path group.png" alt="Star for Life" class="partner-logo">
                <img src="../img/Group 123.png" alt="IT Step University" class="partner-logo">
            </div>
        </div>
    </div>
</div>
<script defer src="../JavaScript/profile.js"></script>
</body>

</html>
