<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Overview (Java Platform SE 8)</title>
    <script type="text/javascript">
        var tmpTargetPage = "" + window.location.search;
        if (tmpTargetPage !== "" && tmpTargetPage !== "undefined") {
            tmpTargetPage = tmpTargetPage.substring(1);
        }
        if (tmpTargetPage.indexOf(":") !== -1 || (tmpTargetPage !== "" && !validURL(tmpTargetPage))) {
            tmpTargetPage = "undefined";
        }
        var targetPage = tmpTargetPage;

        function validURL(url) {
            try {
                url = decodeURIComponent(url);
            } catch (error) {
                return false;
            }
            var pos = url.indexOf(".html");
            if (pos === -1 || pos !== url.length - 5) return false;

            var allowNumber = false;
            var allowSep = false;
            var seenDot = false;
            for (var i = 0; i < url.length - 5; i++) {
                var ch = url.charAt(i);
                if (/[a-zA-Z$_]/.test(ch) || ch.charCodeAt(0) > 127) {
                    allowNumber = true;
                    allowSep = true;
                } else if (/[0-9-]/.test(ch)) {
                    if (!allowNumber) return false;
                } else if (ch === '/' || ch === '.') {
                    if (!allowSep) return false;
                    allowNumber = false;
                    allowSep = false;
                    if (ch === '.') seenDot = true;
                    if (ch === '/' && seenDot) return false;
                } else {
                    return false;
                }
            }
            return true;
        }

        function loadFrames() {
            if (targetPage !== "" && targetPage !== "undefined") {
                top.classFrame.location = top.targetPage;
            }
        }
    </script>
    <script src="/en/dcommon/js/global.js"></script>
</head>

<frameset cols="20%,80%" title="Documentation frame" onload="loadFrames()">
    <frameset rows="30%,70%" title="Left frames">
        <frame src="overview-frame.html" name="packageListFrame" title="All Packages">
            <frame src="allclasses-frame.html" name="packageFrame"
                title="All classes and interfaces (except non-static nested types)">
    </frameset>
    <frame src="overview-summary.html" name="classFrame" title="Package, class and interface descriptions"
        scrolling="yes">
        <noframes>

            <body>
                <noscript>
                    <div>JavaScript is disabled on your browser.</div>
                </noscript>
                <h2>Frame Alert</h2>
                <p>This document is designed to be viewed using the frames feature. If you see this message,
                    you are using a non-frame-capable web client. Link to
                    <a href="overview-summary.html">Non-frame version</a>.
                </p>
            </body>
        </noframes>
</frameset>

</html>
